id: no-fmt-print-in-libs
language: go
severity: warning
message: Do not write to stdout from editor library code — it doesn't own stdout.
note: |
  pkg/tui/editor is a library package that must not write to stdout. While the
  editor's bubbletea program is running it owns the whole terminal: a stray
  fmt.Print would corrupt the rendered outline. Use the bubbletea View, the
  pkg/tui/log helpers, or return a value to the caller instead.

  Exemptions: editor.go is the Run() entry point that prints the final
  "saved" summary AFTER the program exits and the terminal is handed back —
  that one boundary print is intentional, analogous to main()'s startup
  panic. fmt.Sprintf / fmt.Fprintf (no stdout) are not matched.
rule:
  any:
    - pattern:
        context: "func f() { fmt.Println($$$) }"
        selector: call_expression
    - pattern:
        context: "func f() { fmt.Printf($$$) }"
        selector: call_expression
    - pattern:
        context: "func f() { fmt.Print($$$) }"
        selector: call_expression
files:
  - pkg/tui/editor/**
ignores:
  - pkg/tui/editor/editor.go
