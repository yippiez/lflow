id: no-direct-sql-open
language: go
severity: error
message: Use database.Open instead of sql.Open — it sets the sqlite busy timeout.
note: |
  All sqlite connections must be created through database.Open
  (pkg/tui/database/sql.go), which appends `_busy_timeout=5000` to the DSN.
  lflow's one-shot CLI commands can run concurrently with an open inline editor,
  all sharing one DB file; without the busy timeout, a concurrent writer fails
  immediately with SQLITE_BUSY instead of waiting. Calling sql.Open directly
  bypasses that and reintroduces the race, so
  it is only permitted inside pkg/tui/database/sql.go (the one wrapper that owns
  the DSN).
rule:
  pattern:
    context: "v := sql.Open($$$)"
    selector: call_expression
ignores:
  - pkg/tui/database/sql.go
